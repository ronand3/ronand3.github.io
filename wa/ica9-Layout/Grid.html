<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid Examples</title>

<style>

body{
  font: 1.2em / 1.5 sans-serif;
}


.grid-basic {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 20px;
}

.grid-basic > * {
  background-color: #4d7298;
  border: 2px solid #77a6b6;
  border-radius: 0.5em;
  color: white;
  padding: 0.5em;
}


.grid-overlap {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  grid-template-rows: 100px 100px 100px;
  gap: 10px;
}

.grid-overlap > * {
  border-radius: 0.5em;
  color: white;
  padding: 0.5em;
}

.item1 {
  background-color: rgb(74 102 112 / 70%);
  border: 5px solid rgb(74 102 112);
  grid-column: 1 / 4;
  grid-row: 1 / 3;
}

.item2 {
  background-color: rgb(214 162 173 / 70%);
  border: 5px solid rgb(214 162 173);
  grid-column: 2 / 5;
  grid-row: 2 / 4;
}

.grid-areas {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 10px;
  grid-template-areas:
    "aa aa"
    "bb cc"
    ". dd";
}

.grid-areas > * {
  background-color: #4d7298;
  border: 2px solid #77a6b6;
  border-radius: 0.5em;
  color: white;
  padding: 0.5em;
}

.one { grid-area: aa; }
.two { grid-area: bb; }
.three { grid-area: cc; }
.four { grid-area: dd; }

.container {
  display: grid;
  gap: 10px;
  grid-template-columns: 1fr 1fr 1fr;
}

.card {
  display: grid;
  grid-template-rows: 200px min-content;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.tags {
  margin: 0;
  padding: 0;
  list-style: none;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.tags li {
  background-color: #999;
  color: white;
  padding: 0.2em 0.8em;
  border-radius: 0.2em;
  font-size: 80%;
  margin: 5px;
}

</style>
</head>

<body>

<nav>
<div class="grid-basic">
  <div>One</div>
  <div>Two</div>
  <div>Three</div>
  <div>Four</div>
</div>
</nav>

<nav>
<div class="grid-overlap">
  <div class="item1">One</div>
  <div class="item2">Two</div>
</div>
</nav>

<nav>
<div class="grid-areas">
  <div class="one">One</div>
  <div class="two">Two</div>
  <div class="three">Three</div>
  <div class="four">Four</div>
</div>
</nav>

<nav>
<div class="container">

  <div class="card">
    <img src="https://mdn.github.io/shared-assets/images/examples/balloons1.jpg" alt="red balloon">
    <ul class="tags">
      <li>balloon</li>
      <li>red</li>
      <li>sky</li>
      <li>blue</li>
      <li>hot air balloon</li>
    </ul>
  </div>

  <div class="card">
    <img src="https://mdn.github.io/shared-assets/images/examples/balloons2.jpg" alt="balloons over houses">
    <ul class="tags">
      <li>balloons</li>
      <li>houses</li>
      <li>train</li>
      <li>harborside</li>
    </ul>
  </div>

  <div class="card">
    <img src="https://mdn.github.io/shared-assets/images/examples/balloons3.jpg" alt="balloons inflating">
    <ul class="tags">
      <li>balloons</li>
      <li>inflating</li>
      <li>green</li>
      <li>blue</li>
    </ul>
  </div>

  <div class="card">
    <img src="https://mdn.github.io/shared-assets/images/examples/balloons4.jpg" alt="balloon in sun">
    <ul class="tags">
      <li>balloon</li>
      <li>sun</li>
      <li>sky</li>
      <li>summer</li>
      <li>bright</li>
    </ul>
  </div>

</div>
</nav>

</body>
</html>
